name: Paperweight

options:
  bundleIdPrefix: media.baltar.paperweight
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "6X54AWP53W"

targets:

  Paperweight:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Paperweight
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: media.baltar.paperweight
        INFOPLIST_FILE: Paperweight/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Paperweight/Paperweight.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.media.baltar.paperweight
        com.apple.developer.nfc.readersession.formats:
          - NDEF
          - TAG
    dependencies:
      - target: PaperweightMonitor
      - target: PaperweightWatch
        embed: true
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
      - sdk: CoreNFC.framework

  PaperweightMonitor:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PaperweightMonitor
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: media.baltar.paperweight.monitor
        INFOPLIST_FILE: PaperweightMonitor/Info.plist
    entitlements:
      path: PaperweightMonitor/PaperweightMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.media.baltar.paperweight
    dependencies:
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework

  PaperweightWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PaperweightWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: media.baltar.paperweight.watchapp
        INFOPLIST_FILE: PaperweightWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PaperweightWatch/PaperweightWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.media.baltar.paperweight

  PaperweightTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PaperweightTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: media.baltar.paperweight.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
      - sdk: CoreNFC.framework
